version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no

  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - ALLOWED_ORIGINS=http://localhost:5173
    depends_on:
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules

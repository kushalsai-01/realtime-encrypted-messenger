# docker-compose.yml — Local development environment
#
# Prerequisites: copy backend/.env.example to backend/.env and fill in:
#   MONGODB_URI, UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN,
#   UPSTASH_REDIS_URL, JWT_SECRET, JWT_REFRESH_SECRET
#
# Then run: docker-compose up --build
#
# Note: This compose uses a local PostgreSQL container for development.
# Redis for PubSub uses Upstash (UPSTASH_REDIS_URL from .env).
# If you want fully local Redis (no Upstash needed for dev), set
# UPSTASH_REDIS_URL=redis://redis:6379 and all UPSTASH_* vars to dummy values.

version: '3.9'

services:
  # ─── Local PostgreSQL (replaces Supabase for dev) ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cem_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cipherlink
      POSTGRES_USER: cipherlink
      POSTGRES_PASSWORD: devpassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cipherlink"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Local Redis (for pub/sub + rate limiting + presence + offline queue) ─────
  # Set UPSTASH_REDIS_URL=redis://redis:6379 in backend/.env to use this instead of Upstash.
  redis:
    image: redis:7-alpine
    container_name: cem_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: cem_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: "3000"
      SERVER_ID: backend-local
      # Override DATABASE_URL to point to the local postgres container
      DATABASE_URL: postgres://cipherlink:devpassword123@postgres:5432/cipherlink
      # Override Redis to use local container (comment out to use Upstash from .env)
      UPSTASH_REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:5173,http://localhost:80
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Points to the nginx reverse proxy (port 80) which routes /api and /ws to backend
        VITE_API_URL: http://localhost:80
        VITE_WS_URL: ws://localhost:80
    container_name: cem_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  # ─── Nginx reverse proxy (routes /api and /ws to backend, everything else to frontend) ──
  nginx:
    image: nginx:1.25-alpine
    container_name: cem_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:

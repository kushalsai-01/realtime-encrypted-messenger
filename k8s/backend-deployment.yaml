apiVersion: apps/v1
kind: Deployment
metadata:
  name: cipherlink-backend
  namespace: cipherlink
  labels:
    app: cipherlink-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cipherlink-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0    # Never take a pod down before the new one is ready
  template:
    metadata:
      labels:
        app: cipherlink-backend
    spec:
      # Give pods 60s to drain WebSocket connections on shutdown (graceful close)
      terminationGracePeriodSeconds: 60
      containers:
        - name: backend
          # Replace DOCKER_USERNAME with your Docker Hub username
          image: DOCKER_USERNAME/cem-backend:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # SERVER_ID = pod name (unique per replica, used for Redis pub/sub routing)
            - name: SERVER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: cipherlink-config
            - secretRef:
                name: cipherlink-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Graceful shutdown: allow existing connections to drain
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

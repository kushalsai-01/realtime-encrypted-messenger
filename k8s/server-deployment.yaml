apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-server
  namespace: realtime-chat
  labels:
    app: chat-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: chat-server
    spec:
      containers:
        - name: chat-server
          image: your-dockerhub/realtime-chat-server:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: allowed-origins
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: chat-server
  namespace: realtime-chat
spec:
  selector:
    app: chat-server
  ports:
    - port: 80
      targetPort: 3001
  type: ClusterIP


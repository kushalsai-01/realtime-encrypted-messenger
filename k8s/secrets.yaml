# IMPORTANT: Do NOT commit real values to git.
# In CI/CD, replace PLACEHOLDER values using envsubst or kubectl create secret.
#
# To create this secret from CLI (recommended):
#
#   kubectl create secret generic cipherlink-secrets \
#     --namespace cipherlink \
#     --from-literal=DATABASE_URL="postgresql://..." \
#     --from-literal=MONGODB_URI="mongodb+srv://..." \
#     --from-literal=UPSTASH_REDIS_REST_URL="https://..." \
#     --from-literal=UPSTASH_REDIS_REST_TOKEN="..." \
#     --from-literal=UPSTASH_REDIS_URL="rediss://..." \
#     --from-literal=JWT_SECRET="$(openssl rand -base64 64)" \
#     --from-literal=JWT_REFRESH_SECRET="$(openssl rand -base64 64)" \
#     --from-literal=CORS_ORIGIN="https://your-app.vercel.app"
#
# stringData is used here so values don't need to be base64-encoded manually.
# Kubernetes will base64-encode them automatically.
apiVersion: v1
kind: Secret
metadata:
  name: cipherlink-secrets
  namespace: cipherlink
type: Opaque
stringData:
  DATABASE_URL: "PLACEHOLDER"
  MONGODB_URI: "PLACEHOLDER"
  UPSTASH_REDIS_REST_URL: "PLACEHOLDER"
  UPSTASH_REDIS_REST_TOKEN: "PLACEHOLDER"
  UPSTASH_REDIS_URL: "PLACEHOLDER"
  JWT_SECRET: "PLACEHOLDER"
  JWT_REFRESH_SECRET: "PLACEHOLDER"
  CORS_ORIGIN: "PLACEHOLDER"

version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - ALLOWED_ORIGINS=http://localhost:5173
      - PORT=3001
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chat-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - chat-network

volumes:
  redis-data:

networks:
  chat-network:
    driver: bridge


name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package.json
            frontend/package.json

      - name: Install backend
        working-directory: backend
        run: npm ci

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.onrender.com
          VITE_WS_URL: wss://placeholder.onrender.com

      - name: Verify dist
        run: |
          test -f frontend/dist/index.html && echo "✓ Build verified" || exit 1
